<!DOCTYPE html>
<html>

<head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                linear-gradient(135deg, rgba(15, 76, 129, 0.9), rgba(46, 196, 182, 0.9)),
                url("{{ url_for('static', filename='Background3.jpg') }}");
            background-size: cover;
            background-position: center;
        }

        .login-box {
            width: 380px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.25);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .title {
            text-align: center;
            padding: 24px 24px 12px;
            font-size: 26px;
            font-weight: 700;
            color: #0f172a;
        }

        .subtitle {
            text-align: center;
            padding: 0 24px 16px;
            font-size: 13px;
            color: #64748b;
        }

        .tabs {
            display: flex;
            padding: 0 16px 12px;
            gap: 8px;
        }

        .tabs button {
            flex: 1;
            padding: 10px;
            border-radius: 999px;
            border: none;
            background: #e2e8f0;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            color: #475569;
            transition: all 0.15s ease-in-out;
        }

        .tabs button.active {
            background: #2563eb;
            color: #f9fafb;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.35);
        }

        .form {
            padding: 0 24px 24px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
        }

        .input-control {
            width: 100%;
            border-radius: 10px;
            border: 1px solid #cbd5f5;
            padding: 10px 12px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .input-control:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.35);
        }

        .radio-row {
            display: flex;
            gap: 12px;
            font-size: 13px;
            color: #475569;
            margin-bottom: 16px;
        }

        .radio-row label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border: none;
            color: #f9fafb;
            padding: 12px;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            margin-top: 4px;
            box-shadow: 0 12px 25px rgba(37, 99, 235, 0.45);
            transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.03);
            box-shadow: 0 16px 30px rgba(37, 99, 235, 0.5);
        }

        .submit-btn:active {
            transform: translateY(0);
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.4);
        }

        .messages {
            padding: 0 24px 12px;
        }

        .message {
            font-size: 12px;
            padding: 8px 10px;
            border-radius: 8px;
            margin-bottom: 6px;
        }

        .message.error {
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }

        .message.success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
    </style>

    <script>
        function showLogin() {
            document.getElementById("loginForm").style.display = "block";
            document.getElementById("registerForm").style.display = "none";
            document.getElementById("loginTab").classList.add("active");
            document.getElementById("registerTab").classList.remove("active");
        }

        function showRegister() {
            document.getElementById("loginForm").style.display = "none";
            document.getElementById("registerForm").style.display = "block";
            document.getElementById("loginTab").classList.remove("active");
            document.getElementById("registerTab").classList.add("active");
        }
    </script>

</head>

<body onload="showLogin()">
    <div class="login-box">
        <div class="title">Welcome back</div>
        <div class="subtitle">Sign in or create an account to view car listings.</div>

        <div class="messages">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="message {{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}
        </div>

        <div class="tabs">
            <button type="button" id="loginTab" onclick="showLogin()">Login</button>
            <button type="button" id="registerTab" onclick="showRegister()">Register</button>
        </div>

        <form method="POST" id="loginForm" class="form" action="{{ url_for('pythonlogin') }}">
            <input type="hidden" name="form_type" value="login">

            <div class="input-group">
                <label class="input-label" for="login-username">Username</label>
                <input class="input-control" id="login-username" type="text" name="username" placeholder="Enter your username"
                    required>
            </div>

            <div class="input-group">
                <label class="input-label" for="login-password">Password</label>
                <input class="input-control" id="login-password" type="password" name="password"
                    placeholder="Enter your password" required>
            </div>

            <button type="submit" class="submit-btn">Login</button>
        </form>

        <form method="POST" id="registerForm" class="form" action="{{ url_for('pythonlogin') }}"
            style="display:none">
            <input type="hidden" name="form_type" value="register">

            <div class="input-group">
                <label class="input-label" for="register-username">Username</label>
                <input class="input-control" id="register-username" type="text" name="username"
                    placeholder="Choose a username" required>
            </div>

            <div class="input-group">
                <label class="input-label" for="register-password">Password</label>
                <input class="input-control" id="register-password" type="password" name="password"
                    placeholder="Create a password" required>
            </div>

            <div class="radio-row">
                <label>
                    <input type="radio" name="role" value="customer" checked>
                    Customer (view listings)
                </label>
                <label>
                    <input type="radio" name="role" value="admin">
                    Admin (manage listings)
                </label>
            </div>

            <button type="submit" class="submit-btn">Create account</button>
        </form>
    </div>
</body>

</html>
